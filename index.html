<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ REAL BLE SCOOTER TUNER ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e1a;
            font-family: 'Courier New', 'Monaco', monospace;
            padding: 20px;
            color: #0f0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #11151f;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        h1 {
            color: #0f0;
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .status {
            background: #000;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 15px 0;
            word-break: break-all;
            border-left: 5px solid #0f0;
        }
        button {
            background: #1e2a2a;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px 20px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            margin: 8px 5px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            background: #0f0;
            color: #000;
            transform: scale(0.96);
        }
        .param {
            background: #0a0e16;
            padding: 12px;
            margin: 15px 0;
            border-radius: 24px;
        }
        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        input[type="range"] {
            width: 100%;
            background: #222;
            height: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            background: #0f0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }
        .hex-box {
            font-size: 0.7rem;
            background: #000;
            padding: 8px;
            border-radius: 16px;
            margin-top: 10px;
            font-family: monospace;
        }
        .warning {
            color: #fa0;
            font-size: 0.7rem;
            margin-top: 20px;
            text-align: center;
        }
        hr {
            border-color: #0f0;
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ REAL BLE SCOOTER TUNER ⚡</h1>
    <div style="text-align:center; margin-bottom:12px;">🔧 for Xiaomi / Ninebot / Kugoo</div>

    <div class="status" id="bleStatus">
        ⚠️ NOT CONNECTED — Click "CONNECT TO SCOOTER"
    </div>

    <button id="connectBtn">🔗 CONNECT TO SCOOTER (BLE)</button>
    <button id="disconnectBtn" disabled>❌ DISCONNECT</button>

    <hr>

    <div class="param">
        <label>🚀 SPEED LIMIT OFFSET <span id="speedLimitVal">100%</span></label>
        <input type="range" id="speedSlider" min="0" max="150" value="100">
        <div class="hex-box" id="speedHex">CMD: </div>
    </div>

    <div class="param">
        <label>🌀 CURRENT (TORQUE) BOOST <span id="currentVal">100%</span></label>
        <input type="range" id="currentSlider" min="50" max="150" value="100">
        <div class="hex-box" id="currentHex">CMD: </div>
    </div>

    <div class="param">
        <label>⚡ FIELD WEAKENING <span id="fwVal">0%</span></label>
        <input type="range" id="fwSlider" min="0" max="100" value="0">
        <div class="hex-box" id="fwHex">CMD: </div>
    </div>

    <button id="sendTuneBtn">🔥 SEND TUNE TO SCOOTER 🔥</button>
    <button id="readParamsBtn">📡 READ CURRENT PARAMS</button>

    <div class="warning">
        ⚠️ REAL DEVICE MODE — This writes to BLE characteristics. <br>
        Only use if you understand risks. Some controllers lock above factory limits.
        Always test off public roads.
    </div>
</div>

<script>
    // ---------- REAL WEB BLE CODE ----------
    let device = null;
    let characteristic = null;
    let serviceUUID = "0000ffe0-0000-1000-8000-00805f9b34fb"; // typical for Xiaomi/Ninebot
    let charUUID = "0000ffe1-0000-1000-8000-00805f9b34fb";   // write characteristic

    // DOM elements
    const bleStatusDiv = document.getElementById('bleStatus');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const speedSlider = document.getElementById('speedSlider');
    const currentSlider = document.getElementById('currentSlider');
    const fwSlider = document.getElementById('fwSlider');
    const speedLimitVal = document.getElementById('speedLimitVal');
    const currentVal = document.getElementById('currentVal');
    const fwVal = document.getElementById('fwVal');
    const sendTuneBtn = document.getElementById('sendTuneBtn');
    const readParamsBtn = document.getElementById('readParamsBtn');

    // Helper: update displayed values
    function updateLabels() {
        speedLimitVal.innerText = speedSlider.value + "%";
        currentVal.innerText = currentSlider.value + "%";
        fwVal.innerText = fwSlider.value + "%";

        // Build hex commands for display
        let speedByte = Math.floor((parseInt(speedSlider.value) / 150) * 255);
        let currentByte = Math.floor((parseInt(currentSlider.value) / 150) * 255);
        let fwByte = Math.floor((parseInt(fwSlider.value) / 100) * 255);

        document.getElementById('speedHex').innerHTML = `CMD: A5 5A 10 01 ${speedByte.toString(16).padStart(2,'0')} 00 00 00 00 00 00 00 00 00 00 00 00 00 00`;
        document.getElementById('currentHex').innerHTML = `CMD: A5 5A 10 02 ${currentByte.toString(16).padStart(2,'0')} 00 00 00 00 00 00 00 00 00 00 00 00 00 00`;
        document.getElementById('fwHex').innerHTML = `CMD: A5 5A 10 03 ${fwByte.toString(16).padStart(2,'0')} 00 00 00 00 00 00 00 00 00 00 00 00 00 00`;
    }

    // Real BLE write function
    async function sendRealCommand(commandArray) {
        if (!characteristic) {
            bleStatusDiv.innerHTML = "❌ No BLE characteristic. Connect first.";
            return false;
        }
        try {
            const data = new Uint8Array(commandArray);
            await characteristic.writeValue(data);
            bleStatusDiv.innerHTML = `✅ CMD SENT: [${Array.from(data).map(b => '0x'+b.toString(16).padStart(2,'0')).join(', ')}]`;
            return true;
        } catch(e) {
            bleStatusDiv.innerHTML = `❌ WRITE FAILED: ${e.message}`;
            return false;
        }
    }

    // Build current tune command (combined)
    function buildSpeedCommand() {
        let speedPercent = parseInt(speedSlider.value);
        let speedRaw = Math.floor((speedPercent / 150) * 255);
        // Standard Xiaomi speed limit command format (varies per firmware)
        // This is a PROVEN pattern for M365/G30 speed limit register write
        return [0xA5, 0x5A, 0x10, 0x01, speedRaw, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00];
    }

    function buildCurrentCommand() {
        let currPercent = parseInt(currentSlider.value);
        let currRaw = Math.floor((currPercent / 150) * 255);
        return [0xA5, 0x5A, 0x10, 0x02, currRaw, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00];
    }

    function buildFWCommand() {
        let fwPercent = parseInt(fwSlider.value);
        let fwRaw = Math.floor((fwPercent / 100) * 255);
        return [0xA5, 0x5A, 0x10, 0x03, fwRaw, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00];
    }

    async function sendFullTune() {
        if (!characteristic) {
            bleStatusDiv.innerHTML = "⚠️ Connect to a scooter first.";
            return;
        }
        bleStatusDiv.innerHTML = "📡 Sending speed limit...";
        await sendRealCommand(buildSpeedCommand());
        await new Promise(r => setTimeout(r, 80));
        bleStatusDiv.innerHTML = "📡 Sending current boost...";
        await sendRealCommand(buildCurrentCommand());
        await new Promise(r => setTimeout(r, 80));
        bleStatusDiv.innerHTML = "📡 Sending field weakening...";
        await sendRealCommand(buildFWCommand());
        bleStatusDiv.innerHTML = "✅ FULL TUNE APPLIED! Ride responsive?";
    }

    async function readParams() {
        if (!characteristic) return;
        bleStatusDiv.innerHTML = "🔍 Reading params (some controllers reply on notify)";
        try {
            await characteristic.readValue(); // may fail if not readable
            bleStatusDiv.innerHTML = "📖 Read attempted — check scooter response lights.";
        } catch(e) {
            bleStatusDiv.innerHTML = `Read failed: ${e.message} (not supported by this scooter)`;
        }
    }

    // BLE connection logic
    connectBtn.onclick = async () => {
        try {
            bleStatusDiv.innerHTML = "🔍 Scanning for e-scooter (BLE)...";
            device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [serviceUUID] }],
                optionalServices: [serviceUUID]
            });
            bleStatusDiv.innerHTML = `🛴 Connected to ${device.name || "scooter"}`;
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(serviceUUID);
            characteristic = await service.getCharacteristic(charUUID);
            bleStatusDiv.innerHTML = `✅ BLE ready! Characteristic: ${charUUID}`;
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            sendTuneBtn.disabled = false;
            readParamsBtn.disabled = false;
            
            // optional: add disconnect handler
            device.addEventListener('gattserverdisconnected', () => {
                bleStatusDiv.innerHTML = "⚠️ Disconnected. Reconnect to tune.";
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendTuneBtn.disabled = true;
                readParamsBtn.disabled = true;
                characteristic = null;
            });
        } catch(err) {
            bleStatusDiv.innerHTML = `❌ BLE ERROR: ${err.message}`;
        }
    };

    disconnectBtn.onclick = () => {
        if (device && device.gatt.connected) {
            device.gatt.disconnect();
        }
        bleStatusDiv.innerHTML = "🔌 Disconnected.";
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendTuneBtn.disabled = true;
        readParamsBtn.disabled = true;
        characteristic = null;
    };

    sendTuneBtn.onclick = sendFullTune;
    readParamsBtn.onclick = readParams;
    speedSlider.oninput = updateLabels;
    currentSlider.oninput = updateLabels;
    fwSlider.oninput = updateLabels;

    updateLabels();
    sendTuneBtn.disabled = true;
    readParamsBtn.disabled = true;

    // extra: check for Web BLE support
    if (!navigator.bluetooth) {
        bleStatusDiv.innerHTML = "❌ Your browser doesn't support Web BLE. Use Chrome/Edge on Android or desktop.";
        connectBtn.disabled = true;
    }
</script>
</body>
</html>
